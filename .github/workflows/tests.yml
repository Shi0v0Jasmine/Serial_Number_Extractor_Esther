name: tests

on:
  push:
  pull_request:

jobs:
  fast:
    name: Fast tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Run unit, contract, and generated integration tests
        run: >-
          python -m pytest
          -m "not real_pdf and not ocr_integration"
          --cov=serial_extractor
          --cov-report=term-missing
          --cov-report=xml

  paddleocr:
    name: PaddleOCR integration (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Cache PaddleOCR models
        uses: actions/cache@v4
        with:
          path: |
            ~/.paddlex
            ~/.paddleocr
          key: paddleocr-3.7.0-ppocrv6-small-windows
      - name: Install pinned test and OCR dependencies
        run: |
          python -m pip install -r requirements-dev.txt
          python -m pip install -r requirements-ocr.txt
      - name: Run generated scanned-PDF integration
        env:
          RUN_PADDLEOCR_TESTS: "1"
        run: python -m pytest -m ocr_integration
